<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTask Manager - Quản lý lớp học</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-chalkboard-user"></i>
                <h1>StudyTask Manager</h1>
                <p>Quản lý lớp học thông minh</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
            </div>
            
            <!-- Đăng nhập -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Mật khẩu">
                </div>
                <button class="btn-primary" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
                <div class="demo-accounts">
                    <p>👨‍🏫 Tài khoản GVCN: gvcn@school.edu.vn / 123456</p>
                    <p>👩‍🎓 Tài khoản HS: student@school.edu.vn / 123456</p>
                </div>
            </div>
            
            <!-- Đăng ký -->
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Họ tên">
                </div>
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Mật khẩu">
                </div>
                <div class="form-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="regRole">
                        <option value="teacher">👨‍🏫 Giáo viên chủ nhiệm</option>
                        <option value="student">👩‍🎓 Học sinh</option>
                    </select>
                </div>
                <div class="form-group" id="classCodeGroup" style="display:none;">
                    <i class="fas fa-code"></i>
                    <input type="text" id="regClassCode" placeholder="Mã lớp (học sinh nhập)">
                </div>
                <button class="btn-primary" onclick="handleRegister()">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
