<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>StudyTask Manager - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 40px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo-icon i { font-size: 2.5rem; color: white; }
        h1 { text-align: center; font-size: 1.8rem; margin-bottom: 8px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #6c757d; font-size: 0.9rem; margin-bottom: 30px; }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; background: #f1f3f5; padding: 6px; border-radius: 60px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; font-size: 0.95rem; font-weight: 600; border-radius: 50px; cursor: pointer; color: #6c757d; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        
        .form { display: none; animation: fadeIn 0.4s ease; }
        .form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 2px solid transparent;
        }
        .form-group:focus-within { border-color: #667eea; background: white; }
        .form-group i { color: #667eea; width: 24px; }
        .form-group input, .form-group select { flex: 1; border: none; background: none; font-size: 0.95rem; outline: none; font-family: 'Inter', sans-serif; }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        
        .demo-info {
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
        }
        .demo-info p { margin: 5px 0; }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            z-index: 1001;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-icon"><i class="fas fa-chalkboard-user"></i></div>
            <h1>StudyTask Manager</h1>
            <div class="subtitle">Quản lý lớp học thông minh</div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">🔐 Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">📝 Đăng ký (GVCN)</button>
            </div>
            
            <!-- ĐĂNG NHẬP -->
            <div id="loginForm" class="form active">
                <div class="form-group"><i class="fas fa-user-tag"></i>
                    <select id="loginRole">
                        <option value="teacher">👨‍🏫 Giáo viên</option>
                        <option value="student">👩‍🎓 Học sinh</option>
                    </select>
                </div>
                <div class="form-group"><i class="fas fa-id-card"></i><input type="text" id="loginId" placeholder="Mã số (GV: email / HS: số thứ tự)"></div>
                <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Mật khẩu"></div>
                <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-arrow-right-to-bracket"></i> Đăng nhập</button>
                
                <div class="demo-info">
                    <p><strong>📋 Tài khoản mặc định</strong></p>
                    <p>👨‍🏫 GV: <strong>gvcn@school.edu.vn</strong> / 123456</p>
                    <p>👩‍🎓 HS: <strong>HS001</strong> / 123456</p>
                </div>
            </div>
            
            <!-- ĐĂNG KÝ (GVCN) -->
            <div id="registerForm" class="form">
                <div class="form-group"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Họ và tên"></div>
                <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Mật khẩu (6 ký tự)"></div>
                <div class="form-group"><i class="fas fa-school"></i><input type="text" id="regSchool" placeholder="Trường học"></div>
                <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Đăng ký</button>
            </div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('users')) || [];
        
        // Tạo tài khoản mặc định
        if(users.length === 0) {
            users = [
                { id: '1', name: 'Cô Nguyễn Thị B', email: 'gvcn@school.edu.vn', password: '123456', role: 'teacher', school: 'THPT A', classId: 'LOP10A1', className: '10A1', classCode: '10A1-2024' },
                { id: '2', name: 'Nguyễn Văn A', email: '', password: '123456', role: 'student', studentId: 'HS001', classId: 'LOP10A1', className: '10A1' }
            ];
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        function showNotification(msg, isError = false) {
            let n = document.createElement('div'); n.className = 'notification';
            n.style.background = isError ? '#e74c3c' : '#27ae60';
            n.style.color = 'white';
            n.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            if(tab === 'login') {
                loginForm.classList.add('active'); registerForm.classList.remove('active');
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active'); registerForm.classList.add('active');
                tabs[0].classList.remove('active'); tabs[1].classList.add('active');
            }
        }
        
        function handleLogin() {
            const role = document.getElementById('loginRole').value;
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if(!loginId || !password) { showNotification('Vui lòng nhập đầy đủ!', true); return; }
            
            let user;
            if(role === 'teacher') {
                user = users.find(u => u.role === 'teacher' && u.email === loginId && u.password === password);
            } else {
                user = users.find(u => u.role === 'student' && u.studentId === loginId && u.password === password);
            }
            
            if(!user) { showNotification('Sai mã số hoặc mật khẩu!', true); return; }
            
            const { password: _, ...userWithoutPassword } = user;
            localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
            showNotification('Đăng nhập thành công!');
            setTimeout(() => {
                if(user.role === 'teacher') window.location.href = 'teacher.html';
                else window.location.href = 'student.html';
            }, 1000);
        }
        
        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const school = document.getElementById('regSchool').value.trim();
            
            if(!name || !email || !password) { showNotification('Vui lòng nhập đầy đủ!', true); return; }
            if(password.length < 6) { showNotification('Mật khẩu phải có ít nhất 6 ký tự!', true); return; }
            if(users.find(u => u.email === email)) { showNotification('Email đã tồn tại!', true); return; }
            
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password,
                role: 'teacher',
                school: school,
                classId: null,
                className: null,
                classCode: null
            };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            showNotification('Đăng ký thành công! Vui lòng đăng nhập.');
            setTimeout(() => switchTab('login'), 1500);
        }
    </script>
</body>
</html>
