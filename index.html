<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>StudyTask Manager - Quản lý lớp học thông minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .container { max-width: 500px; width: 100%; margin: 0 auto; }
        .auth-card {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .auth-header { text-align: center; margin-bottom: 35px; }
        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo-icon i { font-size: 2.5rem; color: white; }
        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: #f1f3f5;
            padding: 6px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #6c757d;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .auth-form { display: none; animation: fadeIn 0.4s ease; }
        .auth-form.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 2px solid transparent;
        }
        .form-group:focus-within {
            border-color: #667eea;
            background: white;
        }
        .form-group i { color: #667eea; width: 24px; }
        .form-group input, .form-group select {
            flex: 1;
            border: none;
            background: none;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .demo-accounts {
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
            text-align: center;
        }
        .demo-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 12px; }
        .demo-account-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: white;
            border-radius: 15px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .demo-role {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .demo-role.teacher { background: #d1e7ff; color: #0c63e4; }
        .demo-role.student { background: #d1fae5; color: #059669; }
        .custom-notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 20px;
            text-align: center;
            z-index: 1001;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon"><i class="fas fa-chalkboard-user"></i></div>
                <h1>StudyTask Manager</h1>
                <p style="color:#6c757d; font-size:0.9rem;">Quản lý lớp học thông minh</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">🔐 Đăng nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">📝 Đăng ký</button>
            </div>

            <!-- ĐĂNG NHẬP -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email"></div>
                <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Mật khẩu"></div>
                <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-arrow-right-to-bracket"></i> Đăng nhập</button>

                <div class="demo-accounts">
                    <div class="demo-title">📋 Tài khoản mặc định</div>
                    <div class="demo-account-item" onclick="fillDemo('gvcn@school.edu.vn', '123456')">
                        <span class="demo-role teacher">👨‍🏫 GVCN</span>
                        <span>gvcn@school.edu.vn / 123456</span>
                    </div>
                    <div class="demo-account-item" onclick="fillDemo('student@school.edu.vn', '123456')">
                        <span class="demo-role student">👩‍🎓 Học sinh</span>
                        <span>student@school.edu.vn / 123456</span>
                    </div>
                </div>
            </div>

            <!-- ĐĂNG KÝ -->
            <div id="registerForm" class="auth-form">
                <div class="form-group"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="Họ và tên"></div>
                <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="Mật khẩu (6 ký tự)"></div>
                <div class="form-group"><i class="fas fa-user-tag"></i>
                    <select id="regRole">
                        <option value="teacher">👨‍🏫 Giáo viên chủ nhiệm</option>
                        <option value="student">👩‍🎓 Học sinh</option>
                    </select>
                </div>
                <div class="form-group" id="classCodeGroup" style="display:none;"><i class="fas fa-qrcode"></i><input type="text" id="regClassCode" placeholder="Mã lớp (GVCN cung cấp)"></div>
                <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Đăng ký</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== KHỞI TẠO DỮ LIỆU ====================
        // Lấy danh sách người dùng từ localStorage hoặc tạo mới
        let users = JSON.parse(localStorage.getItem('studytask_users')) || [];

        // Tạo tài khoản mặc định nếu chưa có
        if (users.length === 0) {
            users = [
                {
                    id: '1',
                    name: 'Cô Nguyễn Thị B',
                    email: 'gvcn@school.edu.vn',
                    password: '123456',
                    role: 'teacher',
                    classId: 'LOP10A1',
                    createdAt: new Date().toISOString()
                },
                {
                    id: '2',
                    name: 'Nguyễn Văn A',
                    email: 'student@school.edu.vn',
                    password: '123456',
                    role: 'student',
                    classId: 'LOP10A1',
                    createdAt: new Date().toISOString()
                }
            ];
            localStorage.setItem('studytask_users', JSON.stringify(users));
        }

        // ==================== HÀM CHỨC NĂNG ====================
        function showNotification(message, type = 'success') {
            const oldNotif = document.querySelector('.custom-notification');
            if (oldNotif) oldNotif.remove();
            
            const notif = document.createElement('div');
            notif.className = 'custom-notification';
            notif.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
            notif.style.color = 'white';
            notif.innerHTML = (type === 'error' ? '❌ ' : '✅ ') + message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Theo dõi role để hiện/ẩn mã lớp
        const roleSelect = document.getElementById('regRole');
        if (roleSelect) {
            roleSelect.addEventListener('change', function() {
                const classCodeGroup = document.getElementById('classCodeGroup');
                classCodeGroup.style.display = this.value === 'student' ? 'flex' : 'none';
            });
        }

        // Điền tài khoản demo
        function fillDemo(email, password) {
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = password;
            showNotification('Đã điền thông tin đăng nhập!');
        }

        // XỬ LÝ ĐĂNG NHẬP
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showNotification('Vui lòng nhập email và mật khẩu!', 'error');
                return;
            }

            // Tìm user trong danh sách
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                showNotification('Sai email hoặc mật khẩu!', 'error');
                return;
            }

            // Lưu thông tin user đã đăng nhập
            const { password: _, ...userWithoutPassword } = user;
            localStorage.setItem('currentUser', JSON.stringify(userWithoutPassword));
            
            showNotification('Đăng nhập thành công! Đang chuyển hướng...');
            
            setTimeout(() => {
                if (user.role === 'teacher') {
                    window.location.href = 'teacher.html';
                } else {
                    window.location.href = 'student.html';
                }
            }, 1000);
        }

        // XỬ LÝ ĐĂNG KÝ
        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const classCode = document.getElementById('regClassCode').value.trim();

            // Kiểm tra thông tin
            if (!name || !email || !password) {
                showNotification('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            if (password.length < 6) {
                showNotification('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            if (role === 'student' && !classCode) {
                showNotification('Học sinh cần nhập mã lớp!', 'error');
                return;
            }

            // Kiểm tra email đã tồn tại
            const existingUser = users.find(u => u.email === email);
            if (existingUser) {
                showNotification('Email đã được đăng ký!', 'error');
                return;
            }

            // Tạo tài khoản mới
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password,
                role: role,
                classId: role === 'student' ? classCode : `LOP${Date.now().toString().slice(-4)}`,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('studytask_users', JSON.stringify(users));
            
            showNotification('Đăng ký thành công! Vui lòng đăng nhập.');
            
            // Chuyển sang tab đăng nhập và điền email
            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
            }, 1500);
        }
    </script>
</body>
</html>
