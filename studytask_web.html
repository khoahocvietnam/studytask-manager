<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>StudyTask Manager - Quản lý Thời khóa biểu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        /* Panel */
        .panel {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .panel.active {
            display: block;
        }
        
        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        
        /* Weekdays Grid */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }
        
        .weekday-header {
            text-align: center;
            padding: 8px;
            background: #3498db;
            color: white;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .subject-cell {
            background: #ecf0f1;
            border-radius: 12px;
            padding: 8px;
            min-height: 80px;
            font-size: 0.7rem;
            text-align: center;
            white-space: pre-line;
        }
        
        /* Select row */
        .select-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .select-row select, .select-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        
        /* Task list */
        .subject-group {
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .subject-title {
            background: #667eea;
            color: white;
            padding: 12px;
            font-weight: bold;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            gap: 10px;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        .task-text {
            flex: 1;
            font-size: 0.9rem;
        }
        
        .task-text.done {
            text-decoration: line-through;
            color: #999;
        }
        
        .no-task {
            padding: 20px;
            text-align: center;
            color: #999;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-sm {
            padding: 8px 12px;
            font-size: 0.8rem;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            z-index: 1001;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Status */
        .status-bar {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            font-size: 0.8rem;
        }
        
        @media (max-width: 480px) {
            .weekday-header { font-size: 0.6rem; }
            .subject-cell { font-size: 0.6rem; min-height: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 StudyTask Manager</h1>
            <div class="badge">📅 Quản lý thời khóa biểu + công việc</div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('timetable')">📅 TKB</button>
            <button class="tab-btn" onclick="switchTab('tasks')">✅ Công việc</button>
        </div>
        
        <!-- Tab Thời khóa biểu -->
        <div id="timetablePanel" class="panel active">
            <div class="panel-title">📅 Thời khóa biểu</div>
            <div class="weekdays" id="weekdayHeader"></div>
            <div class="weekdays" id="timetableGrid"></div>
            
            <div class="button-group">
                <button class="btn btn-primary btn-sm" onclick="showAddSubjectModal()">➕ Thêm môn</button>
                <button class="btn btn-warning btn-sm" onclick="showEditSubjectModal()">✏️ Sửa môn</button>
                <button class="btn btn-danger btn-sm" onclick="showDeleteSubjectModal()">🗑️ Xóa môn</button>
                <button class="btn btn-success btn-sm" onclick="loadSampleData()">📋 Dữ liệu mẫu</button>
            </div>
        </div>
        
        <!-- Tab Công việc -->
        <div id="tasksPanel" class="panel">
            <div class="panel-title">✅ Công việc cần làm</div>
            
            <div class="select-row">
                <select id="selectDay" onchange="loadTasks()">
                    <option value="Thứ 2">Thứ 2</option>
                    <option value="Thứ 3">Thứ 3</option>
                    <option value="Thứ 4">Thứ 4</option>
                    <option value="Thứ 5">Thứ 5</option>
                    <option value="Thứ 6">Thứ 6</option>
                    <option value="Thứ 7">Thứ 7</option>
                    <option value="Chủ nhật">Chủ nhật</option>
                </select>
                <input type="date" id="selectDate" onchange="loadTasks()">
            </div>
            
            <div id="tasksList"></div>
            
            <div class="button-group">
                <button class="btn btn-primary btn-sm" onclick="showAddTaskModal()">➕ Thêm công việc</button>
                <button class="btn btn-success btn-sm" onclick="saveData()">💾 Lưu thay đổi</button>
            </div>
            
            <div class="status-bar" id="statusBar">📊 Sẵn sàng</div>
        </div>
    </div>
    
    <!-- Modal thêm/sửa môn học -->
    <div id="subjectModal" class="modal">
        <div class="modal-content">
            <h3 id="subjectModalTitle">Thêm môn học</h3>
            <select id="subjectDay">
                <option value="Thứ 2">Thứ 2</option>
                <option value="Thứ 3">Thứ 3</option>
                <option value="Thứ 4">Thứ 4</option>
                <option value="Thứ 5">Thứ 5</option>
                <option value="Thứ 6">Thứ 6</option>
                <option value="Thứ 7">Thứ 7</option>
                <option value="Chủ nhật">Chủ nhật</option>
            </select>
            <input type="text" id="subjectName" placeholder="Tên môn học">
            <select id="oldSubject" style="display:none"></select>
            <div class="button-group">
                <button class="btn btn-primary" onclick="saveSubject()">Lưu</button>
                <button class="btn btn-danger" onclick="closeModal('subjectModal')">Hủy</button>
            </div>
        </div>
    </div>
    
    <!-- Modal thêm công việc -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3>Thêm công việc</h3>
            <select id="taskSubject"></select>
            <textarea id="taskContent" rows="3" placeholder="Nội dung công việc..." style="width:100%; padding:10px; border-radius:12px; border:1px solid #ddd;"></textarea>
            <div class="button-group">
                <button class="btn btn-primary" onclick="saveTask()">Lưu</button>
                <button class="btn btn-danger" onclick="closeModal('taskModal')">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu
        let timetable = {
            "Thứ 2": ["Toán", "Vật lý"],
            "Thứ 3": ["Hóa học", "Ngữ văn"],
            "Thứ 4": ["Toán", "Lịch sử"],
            "Thứ 5": ["Hóa học", "Địa lý"],
            "Thứ 6": ["Vật lý", "Ngữ văn"],
            "Thứ 7": ["Sinh học", "Tin học"],
            "Chủ nhật": []
        };
        
        let tasks = {
            "Toán_Thứ 2": [
                { content: "Làm bài tập chương 2 (trang 45-50)", done: false }
            ]
        };
        
        let currentEditMode = null;
        let currentEditOldSubject = null;
        
        const weekdays = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ nhật"];
        
        // Lưu lên localStorage
        function saveToLocal() {
            const data = { timetable, tasks };
            localStorage.setItem('studytask_data', JSON.stringify(data));
        }
        
        // Tải từ localStorage
        function loadFromLocal() {
            const saved = localStorage.getItem('studytask_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    timetable = data.timetable;
                    tasks = data.tasks;
                } catch(e) {}
            }
        }
        
        // Hiển thị thông báo
        function showNotification(message, isWarning = false) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.style.background = isWarning ? '#e74c3c' : '#27ae60';
            notif.innerHTML = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        // Kiểm tra công việc hôm nay
        function checkTodayTasks() {
            const today = new Date();
            const dayNames = ["Chủ nhật", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"];
            const todayName = dayNames[today.getDay()];
            const subjects = timetable[todayName] || [];
            
            let total = 0, done = 0;
            for (let sub of subjects) {
                const key = `${sub}_${todayName}`;
                const taskList = tasks[key] || [];
                for (let task of taskList) {
                    total++;
                    if (task.done) done++;
                }
            }
            
            const remaining = total - done;
            if (total > 0 && remaining > 0) {
                showNotification(`⚠️ Bạn còn ${remaining} công việc chưa hoàn thành cho hôm nay!`, true);
            } else if (total > 0 && remaining === 0) {
                showNotification(`🎉 Chúc mừng! Bạn đã hoàn thành ${total} công việc hôm nay!`);
            }
        }
        
        // Hiển thị bảng TKB
        function renderTimetable() {
            // Header
            let headerHtml = '';
            weekdays.forEach(day => {
                headerHtml += `<div class="weekday-header">${day}</div>`;
            });
            document.getElementById('weekdayHeader').innerHTML = headerHtml;
            
            // Nội dung
            let gridHtml = '';
            weekdays.forEach(day => {
                const subjects = timetable[day] || [];
                const text = subjects.length ? subjects.join('\n') : '📭 Trống';
                gridHtml += `<div class="subject-cell">${text}</div>`;
            });
            document.getElementById('timetableGrid').innerHTML = gridHtml;
        }
        
        // Hiển thị danh sách công việc
        function loadTasks() {
            const day = document.getElementById('selectDay').value;
            const subjects = timetable[day] || [];
            const tasksContainer = document.getElementById('tasksList');
            
            let html = '';
            for (let subject of subjects) {
                const key = `${subject}_${day}`;
                const taskList = tasks[key] || [];
                
                html += `<div class="subject-group">
                            <div class="subject-title">📖 ${subject}</div>`;
                
                if (taskList.length === 0) {
                    html += `<div class="no-task">📝 Chưa có công việc nào</div>`;
                } else {
                    for (let i = 0; i < taskList.length; i++) {
                        const task = taskList[i];
                        html += `<div class="task-item">
                                    <input type="checkbox" class="task-checkbox" 
                                           onchange="toggleTask('${key}', ${i}, this.checked)"
                                           ${task.done ? 'checked' : ''}>
                                    <span class="task-text ${task.done ? 'done' : ''}">${escapeHtml(task.content)}</span>
                                </div>`;
                    }
                }
                html += `</div>`;
            }
            
            if (subjects.length === 0) {
                html = `<div class="no-task">✨ Không có môn học trong ngày này</div>`;
            }
            
            tasksContainer.innerHTML = html;
            updateStatusBar(day);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTask(key, index, checked) {
            if (tasks[key] && tasks[key][index]) {
                tasks[key][index].done = checked;
                saveToLocal();
                loadTasks();
                updateStatusBar(document.getElementById('selectDay').value);
            }
        }
        
        function updateStatusBar(day) {
            const subjects = timetable[day] || [];
            let total = 0, done = 0;
            for (let sub of subjects) {
                const key = `${sub}_${day}`;
                const taskList = tasks[key] || [];
                for (let task of taskList) {
                    total++;
                    if (task.done) done++;
                }
            }
            const remaining = total - done;
            document.getElementById('statusBar').innerHTML = `✅ Hoàn thành: ${done}/${total} công việc | ⏳ Còn lại: ${remaining}`;
        }
        
        // Hiển thị modal thêm môn
        function showAddSubjectModal() {
            currentEditMode = 'add';
            document.getElementById('subjectModalTitle').innerText = 'Thêm môn học';
            document.getElementById('subjectName').value = '';
            document.getElementById('oldSubject').style.display = 'none';
            document.getElementById('subjectDay').style.display = 'block';
            closeModal('taskModal');
            document.getElementById('subjectModal').classList.add('active');
        }
        
        function showEditSubjectModal() {
            currentEditMode = 'edit';
            document.getElementById('subjectModalTitle').innerText = 'Sửa môn học';
            document.getElementById('subjectName').value = '';
            document.getElementById('oldSubject').style.display = 'block';
            document.getElementById('subjectDay').style.display = 'block';
            
            const day = document.getElementById('subjectDay').value;
            const subjects = timetable[day] || [];
            const oldSelect = document.getElementById('oldSubject');
            oldSelect.innerHTML = '<option value="">-- Chọn môn cũ --</option>';
            subjects.forEach(sub => {
                oldSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
            closeModal('taskModal');
            document.getElementById('subjectModal').classList.add('active');
        }
        
        function showDeleteSubjectModal() {
            currentEditMode = 'delete';
            document.getElementById('subjectModalTitle').innerText = 'Xóa môn học';
            document.getElementById('subjectName').style.display = 'none';
            document.getElementById('oldSubject').style.display = 'block';
            document.getElementById('subjectDay').style.display = 'block';
            
            const day = document.getElementById('subjectDay').value;
            const subjects = timetable[day] || [];
            const oldSelect = document.getElementById('oldSubject');
            oldSelect.innerHTML = '<option value="">-- Chọn môn cần xóa --</option>';
            subjects.forEach(sub => {
                oldSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
            closeModal('taskModal');
            document.getElementById('subjectModal').classList.add('active');
        }
        
        function saveSubject() {
            const day = document.getElementById('subjectDay').value;
            
            if (currentEditMode === 'add') {
                const name = document.getElementById('subjectName').value.trim();
                if (!name) {
                    showNotification('Vui lòng nhập tên môn học!', true);
                    return;
                }
                if (!timetable[day]) timetable[day] = [];
                if (timetable[day].includes(name)) {
                    showNotification('Môn học đã tồn tại!', true);
                    return;
                }
                timetable[day].push(name);
                showNotification(`Đã thêm môn ${name} vào ${day}!`);
            } 
            else if (currentEditMode === 'edit') {
                const oldName = document.getElementById('oldSubject').value;
                const newName = document.getElementById('subjectName').value.trim();
                if (!oldName || !newName) {
                    showNotification('Vui lòng chọn môn cũ và nhập tên mới!', true);
                    return;
                }
                const idx = timetable[day].indexOf(oldName);
                if (idx !== -1) {
                    timetable[day][idx] = newName;
                    // Cập nhật key trong tasks
                    const oldKey = `${oldName}_${day}`;
                    const newKey = `${newName}_${day}`;
                    if (tasks[oldKey]) {
                        tasks[newKey] = tasks[oldKey];
                        delete tasks[oldKey];
                    }
                    showNotification(`Đã sửa môn ${oldName} thành ${newName}!`);
                }
            } 
            else if (currentEditMode === 'delete') {
                const name = document.getElementById('oldSubject').value;
                if (!name) {
                    showNotification('Vui lòng chọn môn cần xóa!', true);
                    return;
                }
                const idx = timetable[day].indexOf(name);
                if (idx !== -1) {
                    timetable[day].splice(idx, 1);
                    const key = `${name}_${day}`;
                    if (tasks[key]) delete tasks[key];
                    showNotification(`Đã xóa môn ${name}!`);
                }
            }
            
            saveToLocal();
            renderTimetable();
            loadTasks();
            closeModal('subjectModal');
        }
        
        function showAddTaskModal() {
            const day = document.getElementById('selectDay').value;
            const subjects = timetable[day] || [];
            const subjectSelect = document.getElementById('taskSubject');
            subjectSelect.innerHTML = '';
            subjects.forEach(sub => {
                subjectSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
            document.getElementById('taskContent').value = '';
            closeModal('subjectModal');
            document.getElementById('taskModal').classList.add('active');
        }
        
        function saveTask() {
            const day = document.getElementById('selectDay').value;
            const subject = document.getElementById('taskSubject').value;
            const content = document.getElementById('taskContent').value.trim();
            
            if (!subject || !content) {
                showNotification('Vui lòng chọn môn và nhập nội dung!', true);
                return;
            }
            
            const key = `${subject}_${day}`;
            if (!tasks[key]) tasks[key] = [];
            tasks[key].push({ content: content, done: false });
            
            saveToLocal();
            loadTasks();
            closeModal('taskModal');
            showNotification('Đã thêm công việc!');
        }
        
        function saveData() {
            saveToLocal();
            showNotification('Đã lưu thay đổi!');
        }
        
        function loadSampleData() {
            timetable = {
                "Thứ 2": ["Toán", "Vật lý"],
                "Thứ 3": ["Hóa học", "Ngữ văn"],
                "Thứ 4": ["Toán", "Lịch sử"],
                "Thứ 5": ["Hóa học", "Địa lý"],
                "Thứ 6": ["Vật lý", "Ngữ văn"],
                "Thứ 7": ["Sinh học", "Tin học"],
                "Chủ nhật": []
            };
            tasks = {
                "Toán_Thứ 2": [{ content: "Làm bài tập chương 2 (trang 45-50)", done: false }]
            };
            saveToLocal();
            renderTimetable();
            loadTasks();
            showNotification('Đã tải dữ liệu mẫu!');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            
            if (tab === 'timetable') {
                document.querySelector('.tab-btn').classList.add('active');
                document.getElementById('timetablePanel').classList.add('active');
                renderTimetable();
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('tasksPanel').classList.add('active');
                document.getElementById('selectDate').valueAsDate = new Date();
                loadTasks();
            }
        }
        
        // Cập nhật danh sách môn khi đổi ngày trong modal edit
        document.getElementById('subjectDay').addEventListener('change', function() {
            if (currentEditMode === 'edit' || currentEditMode === 'delete') {
                const day = this.value;
                const subjects = timetable[day] || [];
                const oldSelect = document.getElementById('oldSubject');
                oldSelect.innerHTML = '<option value="">-- Chọn môn --</option>';
                subjects.forEach(sub => {
                    oldSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
                });
            }
        });
        
        // Khởi tạo
        loadFromLocal();
        renderTimetable();
        document.getElementById('selectDate').valueAsDate = new Date();
        loadTasks();
        
        // Kiểm tra công việc hôm nay sau 1 giây
        setTimeout(checkTodayTasks, 1000);
        
        // Đóng modal khi click ra ngoài
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
