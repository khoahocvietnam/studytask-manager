<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>StudyTask Manager - Học sinh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .dashboard-header { background: rgba(255,255,255,0.98); border-radius: 30px; padding: 18px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 15px; background: #f8f9fa; padding: 8px 18px; border-radius: 50px; }
        .user-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; }
        .dashboard-tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .dash-tab { padding: 12px 28px; background: rgba(255,255,255,0.95); border: none; border-radius: 50px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #4b5563; }
        .dash-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .dash-panel { display: none; background: rgba(255,255,255,0.98); border-radius: 30px; padding: 25px; }
        .dash-panel.active { display: block; }
        .panel-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 3px solid #667eea; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .task-item { background: #f8f9fa; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 4px solid #667eea; display: flex; align-items: center; gap: 15px; }
        .task-checkbox { width: 24px; height: 24px; cursor: pointer; }
        .task-content { flex: 1; }
        .task-title { font-weight: 700; margin-bottom: 5px; }
        .task-done { text-decoration: line-through; opacity: 0.6; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 16px; }
        .weekday-header { text-align: center; padding: 10px; background: #667eea; color: white; border-radius: 15px; font-weight: 600; }
        .subject-cell { background: #f8f9fa; border-radius: 15px; padding: 12px; min-height: 70px; text-align: center; font-size: 0.75rem; white-space: pre-line; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 30px; padding: 25px; width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 15px; }
        .custom-notification { position: fixed; bottom: 20px; left: 20px; right: 20px; padding: 14px; border-radius: 20px; text-align: center; z-index: 1001; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 768px) { .dashboard-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <div class="header-title"><h1><i class="fas fa-graduation-cap"></i> StudyTask Manager</h1></div>
            <div class="user-info"><div class="user-avatar" id="userAvatar">H</div><div><div class="user-name" id="userName"></div><div style="font-size:0.7rem;">Học sinh</div></div><button class="logout-btn" onclick="logout()">Thoát</button></div>
        </div>
        
        <div class="dashboard-tabs">
            <button class="dash-tab active" onclick="switchTab('tasks')"><i class="fas fa-check-circle"></i> Công việc</button>
            <button class="dash-tab" onclick="switchTab('timetable')"><i class="fas fa-calendar-alt"></i> TKB</button>
        </div>
        
        <div id="tasksPanel" class="dash-panel active">
            <div class="panel-title"><span><i class="fas fa-check-circle"></i> Việc cần làm hôm nay - <span id="todayDate"></span></span></div>
            <div id="todayTasksList"></div>
            <div class="panel-title" style="margin-top:25px;"><span><i class="fas fa-calendar-week"></i> Các việc khác</span><button class="btn-primary" style="padding:8px 16px;" onclick="showAddTaskModal()"><i class="fas fa-plus"></i> Thêm việc</button></div>
            <div id="otherTasksList"></div>
        </div>
        
        <div id="timetablePanel" class="dash-panel">
            <div class="panel-title"><span><i class="fas fa-calendar-alt"></i> Thời khóa biểu</span></div>
            <div id="timetableGrid"></div>
        </div>
    </div>
    
    <div id="taskModal" class="modal"><div class="modal-content"><h3>➕ Thêm việc cần làm</h3>
        <div class="form-group"><label>Môn học</label><input type="text" id="taskSubject" placeholder="VD: Toán"></div>
        <div class="form-group"><label>Nội dung</label><textarea id="taskContent" rows="3" placeholder="Mô tả công việc..."></textarea></div>
        <div class="form-group"><label>Hạn nộp</label><input type="date" id="taskDueDate"></div>
        <button class="btn-primary" onclick="addCustomTask()">Thêm</button>
        <button class="btn-outline" style="margin-top:10px;" onclick="closeModal('taskModal')">Hủy</button>
    </div></div>

    <script>
        let currentUser = null;
        let myTasks = [];
        let timetable = {};
        
        (function init() {
            const user = localStorage.getItem('currentUser');
            if(!user) { window.location.href = 'index.html'; return; }
            currentUser = JSON.parse(user);
            if(currentUser.role !== 'student') { window.location.href = 'teacher.html'; return; }
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);
            loadMyTasks();
            loadTimetable();
            renderTodayTasks();
            renderOtherTasks();
        })();
        
        function loadMyTasks() {
            let allTasks = JSON.parse(localStorage.getItem('student_tasks')) || {};
            myTasks = allTasks[currentUser.id] || [];
            if(myTasks.length === 0) {
                myTasks = [];
                allTasks[currentUser.id] = myTasks;
                localStorage.setItem('student_tasks', JSON.stringify(allTasks));
            }
        }
        
        function loadTimetable() {
            let timetables = JSON.parse(localStorage.getItem('timetables')) || {};
            let classTimetable = timetables[currentUser.classId] || { "Thứ 2": [], "Thứ 3": [], "Thứ 4": [], "Thứ 5": [], "Thứ 6": [], "Thứ 7": [], "Chủ nhật": [] };
            timetable = classTimetable;
            let days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ nhật"];
            let html = '<div class="weekdays">' + days.map(d => `<div class="weekday-header">${d}</div>`).join('') + '</div>';
            html += '<div class="weekdays">' + days.map(d => `<div class="subject-cell">${(timetable[d] || []).join('<br>') || '📭 Trống'}</div>`).join('') + '</div>';
            document.getElementById('timetableGrid').innerHTML = html;
        }
        
        function saveMyTasks() {
            let allTasks = JSON.parse(localStorage.getItem('student_tasks')) || {};
            allTasks[currentUser.id] = myTasks;
            localStorage.setItem('student_tasks', JSON.stringify(allTasks));
        }
        
        function showNotification(msg, isError = false) {
            let n = document.createElement('div'); n.className = 'custom-notification';
            n.style.background = isError ? '#e74c3c' : '#27ae60';
            n.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
            document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
        }
        
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        
        function switchTab(tab) {
            document.querySelectorAll('.dash-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}Panel`).classList.add('active');
            if(tab === 'timetable') loadTimetable();
        }
        
        function formatDate(d) { return new Date(d).toLocaleDateString('vi-VN'); }
        function getWeekday() { return ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'][new Date().getDay()]; }
        
        function renderTodayTasks() {
            let today = new Date().toISOString().split('T')[0];
            let todayTasks = myTasks.filter(t => t.dueDate === today);
            let completed = todayTasks.filter(t => t.done).length;
            let html = '';
            todayTasks.forEach(t => {
                html += `<div class="task-item"><input type="checkbox" class="task-checkbox" onchange="toggleTask(${t.id}, this.checked)" ${t.done ? 'checked' : ''}>
                        <div class="task-content"><div class="task-title ${t.done ? 'task-done' : ''}">📖 ${t.subject} - ${t.title}</div>
                        <div style="font-size:0.8rem;">${t.description}</div>
                        <div style="font-size:0.7rem;">📅 Hạn: ${formatDate(t.dueDate)}</div></div></div>`;
            });
            document.getElementById('todayTasksList').innerHTML = html || '<div style="text-align:center; padding:40px;">🎉 Hôm nay không có việc cần làm!</div>';
        }
        
        function renderOtherTasks() {
            let today = new Date().toISOString().split('T')[0];
            let otherTasks = myTasks.filter(t => t.dueDate !== today);
            let html = '';
            otherTasks.forEach(t => {
                html += `<div class="task-item"><input type="checkbox" class="task-checkbox" onchange="toggleTask(${t.id}, this.checked)" ${t.done ? 'checked' : ''}>
                        <div class="task-content"><div class="task-title ${t.done ? 'task-done' : ''}">📖 ${t.subject} - ${t.title}</div>
                        <div style="font-size:0.8rem;">${t.description}</div>
                        <div style="font-size:0.7rem;">📅 Hạn: ${formatDate(t.dueDate)}</div></div></div>`;
            });
            document.getElementById('otherTasksList').innerHTML = html || '<div style="text-align:center; padding:40px;">📭 Không có việc nào khác</div>';
        }
        
        function toggleTask(id, checked) {
            let task = myTasks.find(t => t.id === id);
            if(task) { task.done = checked; saveMyTasks(); renderTodayTasks(); renderOtherTasks(); showNotification(checked ? 'Đã hoàn thành!' : 'Đã bỏ tick'); }
        }
        
        function showAddTaskModal() { document.getElementById('taskModal').classList.add('active'); }
        
        function addCustomTask() {
            let subject = document.getElementById('taskSubject').value.trim();
            let content = document.getElementById('taskContent').value.trim();
            let dueDate = document.getElementById('taskDueDate').value;
            if(!subject || !content) { showNotification('Vui lòng nhập đầy đủ!', true); return; }
            let newTask = {
                id: Date.now(),
                title: content.substring(0, 50),
                subject: subject,
                description: content,
                dueDate: dueDate || new Date(Date.now() + 86400000).toISOString().split('T')[0],
                done: false
            };
            myTasks.push(newTask);
            saveMyTasks();
            renderOtherTasks();
            closeModal('taskModal');
            showNotification('Đã thêm công việc!');
            document.getElementById('taskSubject').value = '';
            document.getElementById('taskContent').value = '';
            document.getElementById('taskDueDate').value = '';
        }
        
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        window.onclick = function(e) { if(e.target.classList.contains('modal')) e.target.classList.remove('active'); }
        
        document.getElementById('todayDate').innerText = `${getWeekday()}, ${new Date().toLocaleDateString('vi-VN')}`;
    </script>
</body>
</html>
