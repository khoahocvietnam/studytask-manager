<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>StudyTask Manager - Học sinh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .dashboard-header {
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            padding: 18px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header-title h1 { font-size: 1.4rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; background: #f8f9fa; padding: 8px 18px; border-radius: 50px; }
        .user-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { transform: translateY(-2px); background: #c0392b; }
        
        .dashboard-tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .dash-tab { padding: 12px 28px; background: rgba(255,255,255,0.95); border: none; border-radius: 50px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s; color: #4b5563; }
        .dash-tab i { margin-right: 8px; }
        .dash-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }
        
        .dash-panel { display: none; background: rgba(255,255,255,0.98); border-radius: 30px; padding: 25px; animation: fadeIn 0.3s ease; }
        .dash-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .panel-title { font-size: 1.2rem; font-weight: 700; color: #1f2937; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 3px solid #667eea; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .task-item { background: #f8f9fa; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 4px solid #667eea; display: flex; align-items: center; gap: 15px; }
        .task-checkbox { width: 24px; height: 24px; cursor: pointer; }
        .task-content { flex: 1; }
        .task-title { font-weight: 700; margin-bottom: 5px; }
        .task-done { text-decoration: line-through; opacity: 0.6; }
        
        .rank-card { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border-radius: 24px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .rank-number { font-size: 2.5rem; font-weight: 800; }
        
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e9ecef; }
        .leaderboard-rank { width: 50px; font-weight: 700; }
        .leaderboard-name { flex: 1; }
        .leaderboard-score { font-weight: 600; color: #667eea; }
        
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 16px; }
        .weekday-header { text-align: center; padding: 10px; background: #667eea; color: white; border-radius: 15px; font-weight: 600; font-size: 0.8rem; }
        .subject-cell { background: #f8f9fa; border-radius: 15px; padding: 12px; min-height: 70px; text-align: center; font-size: 0.75rem; white-space: pre-line; }
        
        .image-preview { background: #f0f0f0; border-radius: 20px; padding: 20px; margin-bottom: 15px; min-height: 180px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; }
        .image-preview img { max-width: 100%; max-height: 160px; border-radius: 15px; }
        .ai-scan-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; padding: 12px; border: none; border-radius: 30px; width: 100%; font-weight: 600; cursor: pointer; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .custom-notification { position: fixed; bottom: 20px; left: 20px; right: 20px; padding: 14px 20px; border-radius: 20px; text-align: center; z-index: 1001; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .btn-success { background: #27ae60; color: white; }
        .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
        
        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; text-align: center; }
            .weekdays { gap: 4px; }
            .weekday-header { font-size: 0.65rem; padding: 6px; }
            .subject-cell { font-size: 0.65rem; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <div class="header-title"><h1><i class="fas fa-graduation-cap"></i> StudyTask Manager</h1><p style="font-size:0.8rem; color:#6c757d;">Học tập thông minh mỗi ngày</p></div>
            <div class="user-info"><div class="user-avatar" id="userAvatar">H</div><div><div class="user-name" id="userName" style="font-weight:600;">Học sinh</div><div style="font-size:0.7rem; color:#6c757d;">Học sinh</div></div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Thoát</button></div>
        </div>
        
        <div class="dashboard-tabs">
            <button class="dash-tab active" onclick="switchTab('tasks')"><i class="fas fa-check-circle"></i> Việc cần làm</button>
            <button class="dash-tab" onclick="switchTab('timetable')"><i class="fas fa-calendar-alt"></i> TKB</button>
            <button class="dash-tab" onclick="switchTab('scan')"><i class="fas fa-camera"></i> 📸 Scan TKB</button>
            <button class="dash-tab" onclick="switchTab('rank')"><i class="fas fa-trophy"></i> Xếp hạng</button>
            <button class="dash-tab" onclick="switchTab('notifications')"><i class="fas fa-bell"></i> Thông báo</button>
        </div>
        
        <!-- Việc cần làm -->
        <div id="tasksPanel" class="dash-panel active">
            <div class="panel-title"><span><i class="fas fa-check-circle"></i> Việc cần làm hôm nay - <span id="todayDate"></span></span><span id="taskSummary" style="font-size:0.85rem;"></span></div>
            <div id="todayTasksList"></div>
            <div class="panel-title" style="margin-top:25px;"><span><i class="fas fa-calendar-week"></i> Các bài tập khác</span><button class="btn-primary" style="padding:8px 16px;" onclick="showAddCustomTask()"><i class="fas fa-plus"></i> Tự thêm</button></div>
            <div id="otherTasksList"></div>
        </div>
        
        <!-- TKB -->
        <div id="timetablePanel" class="dash-panel">
            <div class="panel-title"><span><i class="fas fa-calendar-alt"></i> Thời khóa biểu</span></div>
            <div id="timetableGrid"></div>
        </div>
        
        <!-- Scan TKB -->
        <div id="scanPanel" class="dash-panel">
            <div class="panel-title"><span><i class="fas fa-camera"></i> Quét ảnh TKB</span><span style="background:#e74c3c; padding:4px 12px; border-radius:20px; font-size:0.7rem; color:white;">Gemini AI</span></div>
            <div class="image-preview" id="imagePreview"><span style="color:#999;">📷 Chọn ảnh thời khóa biểu</span></div>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)">
            <button class="btn-primary" onclick="document.getElementById('imageInput').click()" style="width:100%; margin-bottom:10px;"><i class="fas fa-upload"></i> Chọn ảnh từ máy</button>
            <button class="ai-scan-btn" id="scanBtn" onclick="scanImageWithAI()"><i class="fas fa-brain"></i> 🤖 AI Đọc TKB</button>
            <div id="scanResult" style="margin-top:15px; display:none; background:#e8f8f5; padding:15px; border-radius:20px;"><div id="scanResultText"></div><button class="btn-success" style="margin-top:10px; width:100%;" onclick="applyAITimetable()">✅ Áp dụng TKB</button></div>
        </div>
        
        <!-- Xếp hạng -->
        <div id="rankPanel" class="dash-panel">
            <div class="rank-card"><div class="rank-number" id="myRank">#?</div><div>Xếp hạng của bạn</div><div style="font-size:0.85rem; margin-top:5px;" id="myScore">⭐ 0 điểm</div></div>
            <div class="panel-title"><span><i class="fas fa-trophy"></i> Bảng xếp hạng lớp</span></div>
            <div id="leaderboardList"></div>
        </div>
        
        <!-- Thông báo -->
        <div id="notificationsPanel" class="dash-panel">
            <div class="panel-title"><span><i class="fas fa-bell"></i> Thông báo</span></div>
            <div id="notificationsList"></div>
        </div>
    </div>
    
    <!-- Modal thêm công việc tự tạo -->
    <div id="taskModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:white; border-radius:30px; padding:25px; width:90%; max-width:400px;">
            <h3 style="margin-bottom:15px;">➕ Thêm công việc</h3>
            <div class="form-group"><label>Môn học</label><input type="text" id="customTaskSubject" placeholder="VD: Toán"></div>
            <div class="form-group"><label>Nội dung</label><textarea id="customTaskContent" rows="2" placeholder="Mô tả công việc..."></textarea></div>
            <div class="form-group"><label>Hạn nộp</label><input type="date" id="customTaskDueDate"></div>
            <button class="btn-primary" style="width:100%" onclick="addCustomTask()">➕ Thêm</button>
            <button class="btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal()">Hủy</button>
        </div>
    </div>
    
    <style>.modal.active { display: flex !important; } .form-group { margin-bottom: 15px; } .form-group label { display: block; margin-bottom: 5px; font-weight: 500; } .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 15px; }</style>
    
    <script>
        // ==================== KIỂM TRA ĐĂNG NHẬP ====================
        (function checkAuth() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) { window.location.href = 'index.html'; return; }
            const user = JSON.parse(currentUser);
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);
            if (user.role === 'teacher') window.location.href = 'teacher.html';
        })();
        
        // ==================== DỮ LIỆU ====================
        let myTasks = JSON.parse(localStorage.getItem('student_tasks')) || [];
        let timetable = JSON.parse(localStorage.getItem('student_timetable')) || {
            "Thứ 2": ["Toán", "Vật lý"], "Thứ 3": ["Hóa học", "Ngữ văn"], "Thứ 4": ["Toán", "Lịch sử"],
            "Thứ 5": ["Hóa học", "Địa lý"], "Thứ 6": ["Vật lý", "Ngữ văn"], "Thứ 7": ["Sinh học", "Tin học"], "Chủ nhật": []
        };
        let notifications = JSON.parse(localStorage.getItem('student_notifications')) || [
            { id: 1, title: "Chào mừng", content: "Chào mừng bạn đến với StudyTask Manager!", date: new Date().toISOString().split('T')[0] }
        ];
        let leaderboard = JSON.parse(localStorage.getItem('student_leaderboard')) || [
            { rank: 1, name: "Trần Thị B", score: 145 }, { rank: 2, name: "Phạm Văn D", score: 128 },
            { rank: 3, name: "Nguyễn Văn A", score: 115 }, { rank: 4, name: "Lê Thị E", score: 98 }
        ];
        
        // Tạo dữ liệu mẫu nếu chưa có
        if(myTasks.length === 0) {
            myTasks = [
                { id: 1, title: "Bài tập chương 2", subject: "Toán", description: "Giải bài 1-5 trang 45", dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0], isToday: true, done: false },
                { id: 2, title: "Báo cáo thí nghiệm", subject: "Vật lý", description: "Làm báo cáo định luật Ohm", dueDate: new Date(Date.now() + 172800000).toISOString().split('T')[0], isToday: false, done: false }
            ];
            localStorage.setItem('student_tasks', JSON.stringify(myTasks));
        }
        
        // ==================== HÀM CHỨC NĂNG ====================
        function showNotification(msg, isError = false) {
            let n = document.createElement('div'); n.className = 'custom-notification';
            n.style.background = isError ? '#e74c3c' : '#27ae60';
            n.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
            document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
        }
        
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        
        function switchTab(tab) {
            document.querySelectorAll('.dash-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}Panel`).classList.add('active');
            if(tab === 'rank') renderLeaderboard();
            if(tab === 'timetable') renderTimetable();
            if(tab === 'notifications') renderNotifications();
        }
        
        function formatDate(d) { return new Date(d).toLocaleDateString('vi-VN'); }
        function getWeekday() { return ['Chủ nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'][new Date().getDay()]; }
        
        function saveData() {
            localStorage.setItem('student_tasks', JSON.stringify(myTasks));
            localStorage.setItem('student_timetable', JSON.stringify(timetable));
        }
        
        // ==================== HIỂN THỊ CÔNG VIỆC ====================
        function renderTodayTasks() {
            let todayTasks = myTasks.filter(t => t.isToday);
            let completed = todayTasks.filter(t => t.done).length;
            document.getElementById('taskSummary').innerHTML = `✅ ${completed}/${todayTasks.length} hoàn thành`;
            let html = '';
            todayTasks.forEach(t => {
                html += `<div class="task-item"><input type="checkbox" class="task-checkbox" onchange="toggleTask(${t.id}, this.checked)" ${t.done ? 'checked' : ''}>
                        <div class="task-content"><div class="task-title ${t.done ? 'task-done' : ''}">📖 ${t.subject} - ${t.title}</div>
                        <div style="font-size:0.8rem; color:#6c757d;">${t.description}</div>
                        <div style="font-size:0.7rem; margin-top:5px;">📅 Hạn: ${formatDate(t.dueDate)}</div></div></div>`;
            });
            document.getElementById('todayTasksList').innerHTML = html || '<div style="text-align:center; padding:40px;">🎉 Hôm nay không có việc cần làm!</div>';
            checkAndNotifyDueTasks();
        }
        
        function renderOtherTasks() {
            let otherTasks = myTasks.filter(t => !t.isToday);
            let html = '';
            otherTasks.forEach(t => {
                html += `<div class="task-item"><input type="checkbox" class="task-checkbox" onchange="toggleTask(${t.id}, this.checked)" ${t.done ? 'checked' : ''}>
                        <div class="task-content"><div class="task-title ${t.done ? 'task-done' : ''}">📖 ${t.subject} - ${t.title}</div>
                        <div style="font-size:0.8rem; color:#6c757d;">${t.description}</div>
                        <div style="font-size:0.7rem; margin-top:5px;">📅 Hạn: ${formatDate(t.dueDate)}</div></div></div>`;
            });
            document.getElementById('otherTasksList').innerHTML = html || '<div style="text-align:center; padding:40px;">📭 Không có bài tập nào khác</div>';
        }
        
        function toggleTask(id, checked) {
            let task = myTasks.find(t => t.id === id);
            if(task) { 
                task.done = checked; 
                saveData(); 
                renderTodayTasks(); 
                renderOtherTasks(); 
                showNotification(checked ? 'Đã hoàn thành công việc!' : 'Đã bỏ tick hoàn thành');
            }
        }
        
        // ==================== TỰ THÊM CÔNG VIỆC ====================
        function showAddCustomTask() {
            document.getElementById('taskModal').style.display = 'flex';
        }
        
        function addCustomTask() {
            let subject = document.getElementById('customTaskSubject').value;
            let content = document.getElementById('customTaskContent').value;
            let dueDate = document.getElementById('customTaskDueDate').value;
            if(!subject || !content) { showNotification('Vui lòng nhập đầy đủ!', true); return; }
            let newTask = {
                id: Date.now(),
                title: content.substring(0, 50),
                subject: subject,
                description: content,
                dueDate: dueDate || new Date(Date.now() + 86400000).toISOString().split('T')[0],
                isToday: false,
                done: false
            };
            myTasks.push(newTask);
            saveData();
            renderOtherTasks();
            closeModal();
            showNotification('Đã thêm công việc!');
            document.getElementById('customTaskSubject').value = '';
            document.getElementById('customTaskContent').value = '';
            document.getElementById('customTaskDueDate').value = '';
        }
        
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
        
        // ==================== THÔNG BÁO 30 PHÚT TRƯỚC ====================
        function checkAndNotifyDueTasks() {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            
            myTasks.forEach(task => {
                if(task.done) return;
                if(task.dueDate === today) {
                    // Kiểm tra nếu còn 30 phút nữa là đến 23:59
                    const hourLeft = 23 - currentHour;
                    const minuteLeft = 59 - currentMinute;
                    const minutesUntilDue = hourLeft * 60 + minuteLeft;
                    
                    if(minutesUntilDue <= 30 && minutesUntilDue > 25) {
                        const lastNotified = localStorage.getItem(`notified_${task.id}`);
                        if(!lastNotified || new Date() - new Date(lastNotified) > 3600000) {
                            showNotification(`⚠️ Nhắc nhở: Còn 30 phút nữa đến hạn nộp "${task.title}"!`, true);
                            localStorage.setItem(`notified_${task.id}`, new Date().toISOString());
                        }
                    }
                }
            });
        }
        
        // ==================== KIỂM TRA CUỐI NGÀY ====================
        function checkEndOfDay() {
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = myTasks.filter(t => t.dueDate === today && !t.done);
            const lastEndOfDayCheck = localStorage.getItem('lastEndOfDayCheck');
            const todayStr = new Date().toISOString().split('T')[0];
            
            if(lastEndOfDayCheck !== todayStr && todayTasks.length > 0) {
                showNotification(`⚠️ Bạn còn ${todayTasks.length} công việc chưa hoàn thành trong ngày hôm nay! Hãy kiểm tra lại.`, true);
                localStorage.setItem('lastEndOfDayCheck', todayStr);
            }
        }
        
        // ==================== TKB ====================
        function renderTimetable() {
            let days = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ nhật"];
            let html = '<div class="weekdays">' + days.map(d => `<div class="weekday-header">${d}</div>`).join('') + '</div>';
            html += '<div class="weekdays">' + days.map(d => `<div class="subject-cell">${(timetable[d] || []).join('<br>') || '📭'}</div>`).join('') + '</div>';
            document.getElementById('timetableGrid').innerHTML = html;
        }
        
        // ==================== SCAN ẢNH TKB ====================
        let currentImageData = null, aiRecognizedData = null;
        function previewImage(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result.split(',')[1];
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}">`;
                    document.getElementById('scanResult').style.display = 'none';
                    showNotification('Đã tải ảnh thành công!');
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function scanImageWithAI() {
            if(!currentImageData) { showNotification('Vui lòng chọn ảnh!', true); return; }
            const btn = document.getElementById('scanBtn');
            btn.disabled = true; btn.innerHTML = '<span class="loading"></span> AI đang phân tích...';
            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: currentImageData })
                });
                const data = await res.json();
                if(data.success) {
                    aiRecognizedData = data.timetable;
                    let html = '<strong>📖 AI đã đọc được:</strong><br>';
                    for(let day of ["Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7","Chủ nhật"]) {
                        if(aiRecognizedData[day]?.length) html += `<br><strong>${day}:</strong> ${aiRecognizedData[day].join(', ')}`;
                    }
                    document.getElementById('scanResultText').innerHTML = html;
                    document.getElementById('scanResult').style.display = 'block';
                    showNotification('AI đã đọc thành công!');
                } else throw new Error(data.error || 'Không đọc được');
            } catch(e) { showNotification('Lỗi: '+e.message, true); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-brain"></i> 🤖 AI Đọc TKB'; }
        }
        
        function applyAITimetable() {
            if(aiRecognizedData) {
                for(let day of ["Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7","Chủ nhật"]) {
                    if(aiRecognizedData[day]?.length) timetable[day] = aiRecognizedData[day];
                }
                saveData(); renderTimetable(); showNotification('Đã áp dụng TKB từ AI!');
                document.getElementById('scanResult').style.display = 'none';
                switchTab('timetable');
            }
        }
        
        // ==================== XẾP HẠNG & THÔNG BÁO ====================
        function renderLeaderboard() {
            let html = '';
            leaderboard.forEach(item => {
                let isMe = item.name === "Nguyễn Văn A";
                html += `<div class="leaderboard-item" style="${isMe ? 'background:#f0f4ff;' : ''}">
                        <div class="leaderboard-rank">${item.rank === 1 ? '🥇' : item.rank === 2 ? '🥈' : item.rank === 3 ? '🥉' : `#${item.rank}`}</div>
                        <div class="leaderboard-name">${item.name} ${isMe ? '(Bạn)' : ''}</div>
                        <div class="leaderboard-score">⭐ ${item.score}</div></div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
            let myRank = leaderboard.find(l => l.name === "Nguyễn Văn A");
            document.getElementById('myRank').innerHTML = myRank ? `#${myRank.rank}` : '#?';
            document.getElementById('myScore').innerHTML = myRank ? `⭐ ${myRank.score} điểm` : '⭐ 0 điểm';
        }
        
        function renderNotifications() {
            let html = '';
            notifications.forEach(n => {
                html += `<div style="background:#f8f9fa; border-radius:15px; padding:15px; margin-bottom:10px; border-left:4px solid #667eea;">
                        <div style="font-weight:600;">🔔 ${n.title}</div><div style="font-size:0.85rem; margin:8px 0;">${n.content}</div>
                        <div style="font-size:0.7rem; color:#adb5bd;">📅 ${formatDate(n.date)}</div></div>`;
            });
            document.getElementById('notificationsList').innerHTML = html;
        }
        
        // ==================== KHỞI TẠO & TIMER ====================
        document.getElementById('todayDate').innerText = `${getWeekday()}, ${new Date().toLocaleDateString('vi-VN')}`;
        renderTodayTasks(); renderOtherTasks(); renderTimetable(); renderLeaderboard(); renderNotifications();
        checkEndOfDay();
        
        // Kiểm tra mỗi 30 phút
        setInterval(() => {
            checkAndNotifyDueTasks();
            checkEndOfDay();
        }, 30 * 60 * 1000);
        
        // Đóng modal khi click ra ngoài
        window.onclick = function(e) { if(e.target.classList && e.target.classList.contains('modal')) e.target.style.display = 'none'; }
    </script>
</body>
</html>
